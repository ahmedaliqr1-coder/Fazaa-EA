<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول لوحة التحكم</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff !important;
            font-family: Arial, sans-serif;
        }
        .login-box {
            text-align: center;
            width: 100%;
            max-width: 300px;
            padding: 20px;
            background: white;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <form id="loginForm">
            <input type="password" id="password" placeholder="كلمة السر" required autofocus>
            <button type="submit">دخول</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('admin_token', result.token);
                    window.location.href = 'fazaa_admin.html?v=' + Date.now();
                } else {
                    alert('كلمة السر غير صحيحة');
                }
            } catch (err) {
                alert('حدث خطأ في الاتصال بالخادم');
            }
        };
    </script>
</body>
</html>
