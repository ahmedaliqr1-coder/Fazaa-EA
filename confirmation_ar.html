<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الطلب - فزعة 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f5f7fa; color: #1e3a5f; line-height: 1.6; }

        header { background-color: #ffffff; padding: 15px 20px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 1000; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        
        .logo-container img { max-height: 50px; width: auto; display: block; }
        
        .container { max-width: 600px; margin: 40px auto; padding: 0 15px; text-align: center; }
        
        .main-title { color: #1e3a5f; font-size: 1.8rem; font-weight: bold; margin-bottom: 10px; }
        .sub-title { color: #6c7a89; font-size: 1rem; margin-bottom: 30px; }

        .steps-container { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 35px; font-size: 0.9rem; color: #a0aec0; }
        .step { display: flex; align-items: center; gap: 6px; }
        .step.active { color: #1e3a5f; font-weight: bold; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; background-color: #e2e8f0; color: #718096; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .step.active .step-num { background-color: #1e3a5f; color: #fff; }
        .step-line { width: 40px; height: 2px; background-color: #e2e8f0; }
        .step.done { color: #d4af37; }
        .step.done .step-num { background-color: #d4af37; color: #fff; }

        .summary-card { background: #ffffff; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #edf2f7; margin-bottom: 30px; text-align: right; }
        .summary-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f7fafc; }
        .summary-item:last-child { border-bottom: none; }
        .summary-label { font-weight: bold; color: #718096; }
        .summary-value { color: #1e3a5f; font-weight: 600; }

        .payment-info { background-color: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; text-align: right; font-weight: 500; }

        .btn-payment { background: #1e3a5f; color: #ffffff; font-weight: bold; padding: 18px; border-radius: 50px; border: none; width: 100%; font-size: 1.2rem; cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 12px rgba(30, 58, 95, 0.2); }
        .btn-payment:hover { background: #142842; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(30, 58, 95, 0.3); }

        footer { background-color: #1e3a5f; color: #ffffff; padding: 40px 20px; margin-top: 60px; border-top: 4px solid #d4af37; text-align: center; }
        .copyright { color: #cbd5e1; font-size: 0.85rem; opacity: 0.7; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div style="width: 80px;"></div>
            <div class="logo-container">
                <img src="https://i.ibb.co/MDLJXRC1/unnamed-2.png" alt="شعار فزعة">
            </div>
            <div style="width: 80px;"></div>
        </div>
    </header>

    <div class="container">
        <h1 class="main-title">تأكيد البيانات</h1>
        <p class="sub-title">يرجى مراجعة بياناتك قبل الانتقال إلى خطوة الدفع.</p>

        <div class="steps-container">
            <div class="step done"><span class="step-num">1</span> البيانات</div>
            <div class="step-line" style="background-color: #d4af37;"></div>
            <div class="step active"><span class="step-num">2</span> التأكيد</div>
            <div class="step-line"></div>
            <div class="step"><span class="step-num">3</span> الدفع</div>
        </div>

        <div class="summary-card" id="summaryCard">
            <!-- Data will be injected here by JS -->
        </div>

        <div class="payment-info">
            لن يتم تحصيل منك أي رسوم إلا بعد ما رجعت الطلب والموافقة عليه. في حالة عدم الموافقة على طلبك لن يتم خصم أي رسوم منك.
        </div>

        <button class="btn-payment" id="paymentBtn" onclick="alert('جاري الانتقال إلى الدفع...')">متابعة الدفع</button>
    </div>

    <footer>
        <div class="copyright">&copy; 2026 جميع الحقوق محفوظة لفزعة الإمارات.</div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const labels = {
            card_type: "نوع البطاقة",
            full_name: "الاسم الكامل",
            emirates_id: "رقم الهوية",
            spouse_name: "اسم الزوج/الزوجة",
            spouse_id: "هوية الزوج/الزوجة",
            phone: "رقم الهاتف",
            email: "البريد الإلكتروني",
            residency_status: "حالة الإقامة",
            emirate: "الإمارة",
            area: "المنطقة",
            street: "الشارع",
            building: "المبنى",
            floor_apartment: "الدور/الشقة"
        };

        const summaryCard = document.getElementById('summaryCard');

        urlParams.forEach((value, key) => {
            if (value && key !== 'declaration' && labels[key]) {
                const item = document.createElement('div');
                item.className = 'summary-item';
                
                const labelSpan = document.createElement('span');
                labelSpan.className = 'summary-label';
                labelSpan.textContent = labels[key];
                
                const valueSpan = document.createElement('span');
                valueSpan.className = 'summary-value';
                valueSpan.textContent = value;
                
                item.appendChild(labelSpan);
                item.appendChild(valueSpan);
                summaryCard.appendChild(item);
            }
        });

        // Add child data if exists
        for (let i = 1; i <= 4; i++) {
            const name = urlParams.get(`child_name_${i}`);
            const id = urlParams.get(`child_id_${i}`);
            if (name) {
                const item = document.createElement('div');
                item.className = 'summary-item';
                item.style.borderTop = "1px dashed #e2e8f0";
                item.innerHTML = `<span class="summary-label">الابن/الابنة ${i}</span><span class="summary-value">${name} (${id})</span>`;
                summaryCard.appendChild(item);
            }
        }
    </script>
</body>
</html>
