<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - مبادرة فزعة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 0;
            min-height: 100vh;
        }


        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }


        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }


        .header-logos {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }


        .header-logo {
            height: 32px;
            width: auto;
            object-fit: contain;
        }


        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }


        .section {
            margin-bottom: 24px;
        }

            font-size: 14px;
            font-weight: 600;
            color: #9ca3af;
