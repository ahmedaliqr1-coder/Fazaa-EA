<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبي باي - الدفع</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .header-logos img {
            height: 40px;
            filter: brightness(0) invert(1);
        }

        .ref-number {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .ref-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .details-section {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .details-section:hover {
            background: #f0f1f3;
        }

        .details-label {
            color: #2563eb;
            font-weight: 600;
            font-size: 14px;
        }

        .details-arrow {
            color: #2563eb;
            font-size: 12px;
            transition: transform 0.3s;
        }

        .details-section.active .details-arrow {
            transform: rotate(180deg);
        }

        .details-content {
            display: none;
            padding: 15px 20px;
            background: #f8f9fa;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .details-content.active {
            display: block;
        }

        .content {
            padding: 30px 20px;
        }

        .card-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-logos {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card-logo {
            width: 40px;
            height: 30px;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 4px;
        }

        .card-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row.three-cols {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .expiry-group {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 8px;
            align-items: flex-end;
        }

        .expiry-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 16px;
            padding-bottom: 2px;
        }

        .security-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: #e0f2fe;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #0369a1;
        }

        .security-icon {
            font-size: 16px;
        }

        .payment-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .payment-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        .payment-button:active {
            transform: translateY(0);
        }

        .footer {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            text-align: center;
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .footer-logo {
            height: 28px;
            display: flex;
            align-items: center;
        }

        .footer-logo img {
            max-height: 100%;
            max-width: 80px;
            object-fit: contain;
        }

        .footer-text {
            font-size: 11px;
            color: #666;
            line-height: 1.5;
        }

        .footer-text a {
            color: #2563eb;
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px 15px;
            }

            .header {
                padding: 20px 15px;
            }

            .ref-number {
                font-size: 20px;
            }

            .header-logos {
                gap: 15px;
            }

            .header-logos img {
                height: 35px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-logos">
                <span style="font-size: 18px; font-weight: bold;">دبي باي</span>
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="white"/>
                    <path d="M10 20C10 14.48 14.48 10 20 10C25.52 10 30 14.48 30 20C30 25.52 25.52 30 20 30C14.48 30 10 25.52 10 20Z" fill="#2563eb"/>
                    <circle cx="20" cy="20" r="4" fill="white"/>
                </svg>
            </div>
            <div class="ref-number">#590003065957600</div>
            <div class="ref-label">رقم المرجع</div>
        </div>

        <!-- Details Section -->
        <div class="details-section" onclick="toggleDetails()">
            <span class="details-arrow">▼</span>
            <span class="details-label">تفاصيل العملية</span>
        </div>
        <div class="details-content" id="detailsContent">
            <strong>مبلغ الدفع:</strong> 1,500 درهم إماراتي<br>
            <strong>الخدمة:</strong> خدمات حكومة دبي<br>
            <strong>التاريخ:</strong> 4 يوليو 2026<br>
            <strong>الحالة:</strong> في انتظار الدفع
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Security Info -->
            <div class="security-info">
                <span class="security-icon">🔒</span>
                <span>معلومات الدفع الخاصة بك مشفرة وآمنة</span>
            </div>

            <!-- Card Details Section -->
            <div class="card-section">
                <div class="section-title">
                    <span>أدخل بيانات البطاقة</span>
                    <span>💳</span>
                </div>
                <div class="card-logos">
                    <div class="card-logo">
                        <svg viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="48" height="32" rx="4" fill="#EB001B"/>
                            <circle cx="18" cy="16" r="10" fill="#FF5F00"/>
                            <circle cx="30" cy="16" r="10" fill="#FFB81C"/>
                        </svg>
                    </div>
                    <div class="card-logo">
                        <svg viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="48" height="32" rx="4" fill="#1434CB"/>
                            <text x="24" y="20" font-size="12" fill="white" text-anchor="middle" font-weight="bold">VISA</text>
                        </svg>
                    </div>
                    <div class="card-logo">
                        <svg viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="48" height="32" rx="4" fill="#006FCF"/>
                            <text x="24" y="20" font-size="10" fill="white" text-anchor="middle" font-weight="bold">AMEX</text>
                        </svg>
                    </div>
                    <div class="card-logo">
                        <svg viewBox="0 0 48 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="48" height="32" rx="4" fill="#0066B2"/>
                            <text x="24" y="20" font-size="10" fill="white" text-anchor="middle" font-weight="bold">JCB</text>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Form -->
            <form id="paymentForm" onsubmit="handlePayment(event)">
                <!-- Card Number -->
                <div class="form-group">
                    <label class="form-label">رقم البطاقة</label>
                    <input type="text" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>

                <!-- Cardholder Name -->
                <div class="form-group">
                    <label class="form-label">اسم صاحب البطاقة</label>
                    <input type="text" class="form-input" placeholder="أحمد علي" required>
                </div>

                <!-- Expiry and CVV -->
                <div class="form-group">
                    <label class="form-label">تاريخ الانتهاء و CVV</label>
                    <div class="expiry-group">
                        <input type="text" class="form-input" placeholder="YY" maxlength="2" required>
                        <div class="expiry-separator">/</div>
                        <input type="text" class="form-input" placeholder="MM" maxlength="2" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">رمز CVV</label>
                    <input type="password" class="form-input" placeholder="•••" maxlength="4" required>
                </div>

                <!-- Payment Button -->
                <button type="submit" class="payment-button">ادفع الآن</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-logos">
                <div class="footer-logo">
                    <svg viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <text x="30" y="25" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">PCI DSS</text>
                    </svg>
                </div>
                <div class="footer-logo">
                    <svg viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <text x="30" y="25" font-size="12" fill="#0066B2" text-anchor="middle" font-weight="bold">معتمد</text>
                    </svg>
                </div>
                <div class="footer-logo">
                    <svg viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <text x="30" y="25" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">آمن</text>
                    </svg>
                </div>
            </div>
            <div class="footer-text">
                <p>دفعتك محمية بمعايير أمان عالمية رائدة.</p>
                <p><a href="#">سياسة الخصوصية</a> | <a href="#">شروط الخدمة</a></p>
            </div>
        </div>
    </div>

    <script>
        function toggleDetails() {
            const content = document.getElementById('detailsContent');
            const section = document.querySelector('.details-section');
            content.classList.toggle('active');
            section.classList.toggle('active');
        }

        function handlePayment(event) {
            event.preventDefault();
            alert('جاري معالجة دفعتك بشكل آمن...\n\nهذا عرض توضيحي. لن تتم معالجة أي دفع فعلي.');
        }

        // Format card number input
        document.querySelectorAll('input[placeholder*="1234"]').forEach(input => {
            input.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\s/g, '');
                let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
                e.target.value = formattedValue;
            });
        });
    </script>
</body>
</html>
