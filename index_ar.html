<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبادرة فزعة لعام الأسرة 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f5f7fa; color: #1e3a5f; line-height: 1.6; }
        header { background-color: #ffffff; padding: 15px 20px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 1000; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo-container img { max-height: 50px; width: auto; display: block; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; text-align: center; }
        .form-section { background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #edf2f7; margin-bottom: 20px; text-align: right; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; font-weight: bold; font-size: 0.95rem; color: #2d3748; margin-bottom: 8px; }
        .input-control { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; background-color: #f7fafc; font-size: 1rem; color: #2d3748; outline: none; transition: 0.3s; text-align: right; }
        .btn-submit { background: linear-gradient(135deg, #1e3a5f, #2c5282); color: #fff; border: none; width: 100%; padding: 16px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-container">
                <img src="dubai_digital_logo.png" alt="Dubai Digital">
            </div>
        </div>
    </header>
    <div class="container">
        <h1 class="main-title">مبادرة فزعة 2026</h1>
        <div class="form-section">
            <form id="dataForm">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="name" class="input-control" required>
                </div>
                <div class="input-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="phone" class="input-control" required>
                </div>
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" class="input-control" required>
                </div>
                <button type="submit" class="btn-submit">تقديم الطلب</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('dataForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            };
            
            // Save data to sessionStorage for the payment page
            sessionStorage.setItem('userData', JSON.stringify(data));
            
            // Redirect to payment_ar.html
            window.location.href = 'payment_ar.html';
        });
    </script>
</body>
</html>
